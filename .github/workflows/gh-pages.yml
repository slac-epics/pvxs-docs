# Build SPVA documentation and deploy to GitHub Pages
#
# Triggers on pushes to main branch.
# Builds Sphinx HTML from RST sources, with Doxygen extraction of C++ API
# reference from sibling epics-base, pvxs (branch tls), and pvxs-cms
# (branch main)
# checkouts. Publishes to the gh-pages environment associated with this
# repository.

name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install sphinx breathe furo sphinx-reredirects

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Clone sibling pvxs (branch tls) for Doxygen extraction
        run: git clone --depth 1 --branch tls https://github.com/slac-epics/pvxs ../pvxs

      - name: Clone sibling pvxs-cms (branch main) for Doxygen extraction
        run: git clone --depth 1 --branch main https://github.com/slac-epics/pvxs-cms ../pvxs-cms

      - name: Clone sibling epics-base for Doxygen extraction
        run: git clone --depth 1 https://github.com/slac-epics/epics-base ../epics-base

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build documentation
        run: make OUTPUT_DIR=_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
